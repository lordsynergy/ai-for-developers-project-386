name: OpenCode PR review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  opencode-review:
    if: ${{ !github.event.pull_request.draft && !endsWith(github.event.pull_request.user.login, '[bot]') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenCode review
        uses: anomalyco/opencode/github@latest
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        with:
          model: opencode/deepseek-v4-flash-free
          prompt: |
            Review this pull request:
            - Find bugs and risky behavioral changes.
            - Check readability and maintainability.
            - Check whether tests are missing for risky changes.
            - Leave concise, actionable review comments.
